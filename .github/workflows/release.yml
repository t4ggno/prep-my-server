name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python dpkg-dev fakeroot

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.19.0

      - name: Resolve release metadata
        id: meta
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${REQUESTED_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "A release tag is required." >&2
            exit 1
          fi

          version="${tag#v}"
          if [[ ! "${version}" =~ ^[0-9] ]]; then
            echo "Expected a tag like v0.1.0, got '${tag}'." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve Linux executable asset name
        id: linux_asset
        run: echo "path=dist/prep-my-server-linux-$(dpkg --print-architecture)" >> "${GITHUB_OUTPUT}"

      - name: Compile Python sources
        run: python -m compileall .

      - name: Build zipapp artifact
        run: python build_artifacts.py pyz --output-dir dist

      - name: Build self-contained Linux executable
        run: python build_artifacts.py pyinstaller --output-dir dist

      - name: Rename Linux executable artifact
        run: mv dist/prep-my-server "${{ steps.linux_asset.outputs.path }}"

      - name: Build Debian package
        env:
          DEB_MAINTAINER: ${{ vars.DEB_MAINTAINER != '' && vars.DEB_MAINTAINER || 'GitHub Actions <41898282+github-actions[bot]@users.noreply.github.com>' }}
        run: |
          python build_artifacts.py deb \
            --output-dir dist \
            --version "${{ steps.meta.outputs.version }}" \
            --maintainer "${DEB_MAINTAINER}"

      - name: Verify zipapp metadata
        run: python -m zipapp --info dist/prep-my-server.pyz

      - name: Verify self-contained Linux executable
        run: |
          "${{ steps.linux_asset.outputs.path }}" --help >/dev/null
          file "${{ steps.linux_asset.outputs.path }}"

      - name: Verify Debian package metadata
        run: |
          dpkg-deb --info "dist/prep-my-server_${{ steps.meta.outputs.version }}_all.deb"
          dpkg-deb --contents "dist/prep-my-server_${{ steps.meta.outputs.version }}_all.deb" | grep -E './usr/bin/prep-my-server|./usr/share/prep-my-server/main.py'

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets
          path: |
            dist/prep-my-server.pyz
            ${{ steps.linux_asset.outputs.path }}
            dist/prep-my-server_${{ steps.meta.outputs.version }}_all.deb
          retention-days: 14

  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: release-assets
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(dist/*)
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --repo "${GH_REPO}" --clobber
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --repo "${GH_REPO}" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              --title "${RELEASE_TAG}"
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --repo "${GH_REPO}" \
              --verify-tag \
              --generate-notes \
              --title "${RELEASE_TAG}"
          fi